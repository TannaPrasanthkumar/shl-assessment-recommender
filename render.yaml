services:
  - type: web
    name: shl-assessment-recommender
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LLM_MODEL
        value: gemini-2.5-flash
      - key: PROJECT_NAME
        value: SHL Assessment Recommender
